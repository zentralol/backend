name: Test Bastion SSH Connection

# 触发条件设置
on:
  push:
    branches:
      - main  # 当你推送代码到 main 分支时自动触发（可根据你的实际分支名修改）
  workflow_dispatch: # 魔法开关：允许你在 GitHub 网页端手动点击按钮触发测试

jobs:
  test-connection:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Target VPS via Bastion Host
        uses: appleboy/ssh-action@v1.0.3
        with:
          # 1. 目标 VPS 配置
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          
          # 2. 跳板机 (Bastion) 配置
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USERNAME }}
          proxy_key: ${{ secrets.PROXY_SSH_KEY }}
          
          # 3. 登录成功后在【目标 VPS】上执行的测试命令
          script: |
            echo "🎉 恭喜！GitHub Actions 成功穿透跳板机，登录到了目标 VPS！"
            echo "当前登录用户: $(whoami)"
            echo "当前所在主机名: $(hostname)"
            echo "---"
            echo "正在测试 Docker 权限..."
            docker --version || echo "⚠️ 警告：当前用户无法执行 Docker 命令"
            docker ps || echo "⚠️ 警告：当前用户没有权限查看 Docker 容器运行状态"
